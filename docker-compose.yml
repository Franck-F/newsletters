version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: newsletters_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: newsletters
      POSTGRES_PASSWORD: newsletters_dev
      POSTGRES_DB: newsletters
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
