<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm your subscription</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f4f5; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; margin-top: 40px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #111; font-size: 24px; margin-top: 0; }
        p { font-size: 16px; color: #555; margin-bottom: 30px; }
        .btn { display: inline-block; background-color: #2563eb; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; font-size: 16px; transition: background-color 0.2s; }
        .btn:hover { background-color: #1d4ed8; }
        .footer { margin-top: 30px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome!</h1>
        <p>Thanks for signing up for our newsletter. Please click the button below to confirm your subscription and start receiving our updates.</p>
        
        <a href="{{ confirm_url }}" class="btn">Confirm Subscription</a>
        
        <div class="footer">
            <p>If you didn't request this email, you can safely ignore it.</p>
        </div>
    </div>
</body>
</html>
