<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f4f5; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 20px; border-radius: 8px; margin-top: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { text-align: center; border-bottom: 2px solid #eaeaea; padding-bottom: 20px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #111; font-size: 24px; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }
        .content { font-size: 16px; }
        .content h2 { font-size: 20px; color: #222; margin-top: 25px; margin-bottom: 15px; }
        .content ul { padding-left: 20px; }
        .content li { margin-bottom: 15px; }
        .content a { color: #2563eb; text-decoration: none; font-weight: bold; }
        .content a:hover { text-decoration: underline; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eaeaea; text-align: center; font-size: 12px; color: #888; }
        .footer a { color: #888; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Weekly Newsletter</h1>
            <p>{{ date }}</p>
        </div>
        
        <div class="content">
            {{ content_body | safe }}
        </div>
        
        <div class="footer">
            <p>You received this email because you are subscribed to our newsletter.</p>
            <p><a href="{{ unsubscribe_link }}?email={{ '{' }}{{ 'email' }}{{ '}' }}">Unsubscribe</a></p>
        </div>
    </div>
</body>
</html>
